[project]
name = "grouped-project"
version = "0.1.0"
dependencies = [
  "requests==2.31.0",
]

[project.optional-dependencies]
docs = [
  "mkdocs>=1.6",
]

[dependency-groups]
lint = [
  "ruff==0.5.0",
]
dev = [
  "pytest==8.2.0",
  { include-group = "lint" },
]
test = [
  "pytest-cov==5.0.0",
  { include-group = "dev" },
]
